defaults:
  - override hydra/launcher: dh
  - override hydra/sweeper: optuna

hydra:
  launcher:
    # override the number of jobs
    n_jobs: 1
    project_name: test-hydra
    function: test-hydra-function
    job_ref: 123
    local_execution: true
  
  sweeper:
    sampler:
      seed: 123
    direction: minimize
    study_name: sphere
    storage: null
    n_trials: 20
    n_jobs: 5
    # max_failure_rate: 0.0
    params:
      x: range(-5.5, 5.5, step=0.5)
      y: choice(-5 ,0 ,5)

x: 1
y: 1
z: 1